name: prikotes

services:
  app:
    image: "${COMPOSE_PROJECT_NAME:-prikotes}-app:latest"
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      network: host
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    working_dir: /var/www/html
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.docker}
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_public:/var/www/html/public
      - app_storage:/var/www/html/storage
      - bootstrap_cache:/var/www/html/bootstrap/cache
      - ./.env.docker:/var/www/html/.env:ro
      - ./docker/php/custom.ini:/usr/local/etc/php/conf.d/custom.ini:ro

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8003}:80"
    depends_on:
      - app
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app_public:/var/www/html/public:ro
      - app_storage:/var/www/html/storage:ro

  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-prikotes_app}
      MYSQL_USER: ${DB_USERNAME:-prikotes}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change-root-password}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mariadb-admin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - db_data:/var/lib/mysql

volumes:
  app_public:
  app_storage:
  bootstrap_cache:
  db_data:
